<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/home.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/producer_dashboard.css') }}">
    <title>Edit Product</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
</head>
<body>
{% include "navbar.html" %}

<h2>Edit Product</h2>

<!DOCTYPE html>
<html>
<head><title>Edit {{ product.name }}</title></head>
<body>


<form method="POST">
    <label>Name:</label>
    <input type="text" name="name" value="{{ product.name }}">

    <label>Price:</label>
    <input type="number" step="0.01" name="price" value="{{ product.price_gbp }}">

    <label>Stock:</label>
    <input type="number" name="stock" value="{{ product.stock }}">


    <label>Image Path (inside static/):</label><br>
    <input type="text" name="image" placeholder="images/products/apples.jpg" required><br><br>
   
    <label>Description:</label>
    <textarea name="description">{{ product.description }}</textarea>

    <button type="submit">Save Changes</button>

</form>

</body>
</html>

    


</body>
</html>
